# GitHub Actions CI Workflow

name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats warnings as non-fatal for this demo
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

    - name: Check code style with black (optional)
      run: |
        pip install black
        black --check . --line-length 100
      continue-on-error: true

    - name: Verify directory structure
      run: |
        echo "Checking required files..."
        test -f src/faers_sglt2_dka/preprocess.py
        test -f src/faers_sglt2_dka/modeling.py
        test -f scripts/paper_pipeline.py
        test -f config/terms.yml
        echo "All required files present!"

    - name: Validate configuration
      run: |
        python -c "import yaml; yaml.safe_load(open('config/terms.yml'))"
        echo "Configuration file is valid YAML!"

  build-docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Verify README links
      run: |
        # Basic check that README references exist
        grep -q "README-cn.md" README.md || echo "Warning: Chinese README reference missing"
        grep -q "requirements.txt" README.md || echo "Warning: requirements.txt reference missing"

  release:
    needs: [test, build-docs]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v3

    - name: Generate Release Notes
      run: |
        echo "Release ${GITHUB_REF#refs/tags/} created"
        echo "Review changes in: https://github.com/huaibing-xtu/faers-sglt2-dka/compare/${{ github.event.before }}...${{ github.sha }}"
